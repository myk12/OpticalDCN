#####################################################
#         NOPaxos Configuration
#####################################################
nopaxos:
  udp_port: 12000
  group_addr: 17.0.0.255
  sequencer:
    endpoint: fpga_2
    iface: p1
  replicas:
  - id: replica1
    endpoint: fpga_1
    iface: p1
  - id: replica2
    endpoint: fpga_3
    iface: p1
  - id: replica3
    endpoint: fpga_5
    iface: p1
