# Synchronous topology definition for spine-leaf testbed with 8 FPGA boards connected to a single Tofino switch.
# This topology defines 8 FPGA boards connected via a single Tofino switch
# in a folded spine-leaf architecture (4 logical leaves + 2 logical spines).
# Each FPGA board has 2 NIC interfaces installed on 4 physical servers.

# Synchronous topology definition (v1) for OpticalDCN bring-up on a single Tofino2 switch.
#
# This v1 topology is a simplified folded Clos for early connectivity tests and Phase-1 NOPaxos.
# IMPORTANT (current cabling constraint):
#   - Only Leaf1..Leaf3 have server downlinks physically connected at the moment.
#   - Leaf4 (ports 13–16) is currently treated as fully inactive (no server downlinks, no fabric uplink).
#
# Switch port groups:
#   Leaf1:  1-4     Leaf2:  5-8     Leaf3:  9-12    Leaf4: 13-16
#   Spine1: 17-20   Spine2: 21-24
#
# Active fabric links (uplinks):
#   Spine1:17/0 <-> Leaf1:4/0     (spine1_p1 <-> leaf1_p4)
#   Spine1:19/0 <-> Leaf2:8/0     (spine1_p3 <-> leaf2_p4)
#   Spine2:21/0 <-> Leaf3:12/0    (spine2_p1 <-> leaf3_p4)
#
# Unused fabric ports:
#   Spine: 18/0, 20/0, 22/0, 23/0, 24/0
#   Leaf:  3/0, 7/0, 11/0, 13/0, 14/0, 15/0, 16/0
#
# Active server downlinks (dataplane NICs, p1 only):
#   Leaf1:1/0  -> fpga_1:p1     Leaf1:2/0  -> fpga_2:p1
#   Leaf2:5/0  -> fpga_3:p1     Leaf2:6/0  -> fpga_4:p1
#   Leaf3:9/0  -> fpga_5:p1     Leaf3:10/0 -> fpga_6:p1
#
# Dataplane addressing:
#   - Active FPGA p1 interfaces use 177.0.0.0/24 (see endpoints for exact IP/MAC).
#
# NOPaxos Phase-1 configuration (host sequencer):
#   - udp_port: 12000
#   - groupaddr: 177.0.0.255
#   - sequencer: fpga_2:p1
#   - replicas:  fpga_1:p1, fpga_3:p1, fpga_5:p1

version: 1

testbed:
  name: "optical-dcn-spineleaf-topo"
  description: "Spine-leaf topology with 8 FPGA boards connected to a single Tofino2 switch."

####################################################################
#                       Switch Topology                            #
####################################################################
switch:
  name: tofino_1
  model: tofino2
  mgmt: {host: 10.0.13.21, username: p4, password_env: TOFINO4_PASSWORD}
  sde: {version: 9.12.0, install_path: /home/p4/bf-sde-9.12.0}
  bfshell: /home/p4/bf-sde-9.12.0/install/bin/bfshell
  sde_env: /home/p4/bf-sde-9.12.0/set_sde.bash

  stages:
    spines:
      - id: spine1
        ports: [spine1_p1, spine1_p2, spine1_p3, spine1_p4]   # 17,18,19,20
      - id: spine2
        ports: [spine2_p1, spine2_p2, spine2_p3, spine2_p4]   # 21,22,23,24
    leaves:
      - id: leaf1
        ports: [leaf1_p1, leaf1_p2, leaf1_p3, leaf1_p4]       # 1,2,3,4
      - id: leaf2
        ports: [leaf2_p1, leaf2_p2, leaf2_p3, leaf2_p4]       # 5,6,7,8
      - id: leaf3
        ports: [leaf3_p1, leaf3_p2, leaf3_p3, leaf3_p4]       # 9,10,11,12
      - id: leaf4
        ports: [leaf4_p1, leaf4_p2, leaf4_p3, leaf4_p4]       # 13,14,15,16

  ports:
    # -----------------------
    # Spine 1: 17-20 (fabric)
    # -----------------------
    - id: spine1_p1
      role: fabric
      port: "17/0"
      spec: {speed: 100G, fec: None}
      pair_with: leaf1_p4

    - id: spine1_p2
      role: unused
      port: "18/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    - id: spine1_p3
      role: fabric
      port: "19/0"
      spec: {speed: 100G, fec: None}
      pair_with: leaf2_p4

    - id: spine1_p4
      role: unused
      port: "20/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    # -----------------------
    # Spine 2: 21-24 (fabric)
    # -----------------------
    - id: spine2_p1
      role: fabric
      port: "21/0"
      spec: {speed: 100G, fec: None}
      pair_with: leaf3_p4

    - id: spine2_p2
      role: unused
      port: "22/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    - id: spine2_p3
      role: unused
      port: "23/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    - id: spine2_p4
      role: unused
      port: "24/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    # -----------------------
    # Leaf 1: ports 1-4
    # odd uplinks: 1,3; even downlinks: 2,4
    # -----------------------
    - id: leaf1_p1
      role: server
      port: "1/0"
      spec: {speed: 100G, fec: RS}
      connected_to: {endpoint: fpga_1, iface: p1}

    - id: leaf1_p2
      role: server
      port: "2/0"
      spec: {speed: 100G, fec: RS}
      connected_to: {endpoint: fpga_2, iface: p1}

    - id: leaf1_p3
      role: unused 
      port: "3/0"
      spec: {speed: 100G, fec: None}
      pair_with: null 

    - id: leaf1_p4
      role: fabric 
      port: "4/0"
      spec: {speed: 100G, fec: None}
      pair_with: spine1_p1

    # -----------------------
    # Leaf 2: ports 5-8
    # odd uplinks: 5,7; even downlinks: 6,8
    # -----------------------
    - id: leaf2_p1
      role: server
      port: "5/0"
      spec: {speed: 100G, fec: RS}
      connected_to: {endpoint: fpga_3, iface: p1}

    - id: leaf2_p2
      role: server
      port: "6/0"
      spec: {speed: 100G, fec: RS}
      connected_to: {endpoint: fpga_4, iface: p1}

    - id: leaf2_p3
      role: unused
      port: "7/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    - id: leaf2_p4
      role: fabric
      port: "8/0"
      spec: {speed: 100G, fec: None}
      pair_with: spine1_p3

    # -----------------------
    # Leaf 3: ports 9-12
    # odd uplinks: 9,11; even downlinks: 10,12
    # -----------------------
    - id: leaf3_p1
      role: server
      port: "9/0"
      spec: {speed: 100G, fec: RS}
      connected_to: {endpoint: fpga_5, iface: p1}

    - id: leaf3_p2
      role: server
      port: "10/0"
      spec: {speed: 100G, fec: RS}
      connected_to: {endpoint: fpga_6, iface: p1}

    - id: leaf3_p3
      role: unused
      port: "11/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    - id: leaf3_p4
      role: fabric
      port: "12/0"
      spec: {speed: 100G, fec: None}
      pair_with: spine2_p1

    # -----------------------
    # Leaf 4: ports 13-16
    # odd uplinks: 13,15; even downlinks: 14,16
    # -----------------------
    - id: leaf4_p1
      role: unused
      port: "13/0"
      spec: {speed: 100G, fec: RS}
      connected_to: null

    - id: leaf4_p2
      role: unused
      port: "14/0"
      spec: {speed: 100G, fec: RS}
      connected_to: null

    - id: leaf4_p3
      role: unused
      port: "15/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

    - id: leaf4_p4
      role: unused
      port: "16/0"
      spec: {speed: 100G, fec: None}
      pair_with: null

#####################################################################
#                       Host Topology                               #
#####################################################################
hosts:
  - id: server1
    hostname: inet-p4lab-14
    subnet: 177.0.0.0/24
    endpoints: [fpga_1, fpga_2]
  - id: server2
    hostname: inet-p4lab-13
    subnet: 177.0.0.0/24
    endpoints: [fpga_3, fpga_4]
  - id: server3
    hostname: inet-p4lab-12
