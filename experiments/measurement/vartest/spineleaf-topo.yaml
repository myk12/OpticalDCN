# Synchronous topology for vartest measurement
# This topology defines 8 FPGA boards connected via a single Tofino switch
# in a spine-leaf architecture. Each FPGA board has 2 network interfaces
# installed on 4 different physical machines.
#                           ┌────────── Spine (pipeline1/2/3) ──────────┐
#                           │ p1:{1,3,5,7}  p2:{9,11,13,15}  p3:{17,19,21,23} │
#                           └──────────────────────────────────────────┘
#
#       Leaf1 (1–4)                 Leaf2 (5–8)                 Leaf3 (9–12)                Leaf4 (13–16)
#     +-------------+             +-------------+             +-------------+              +-------------+
#     | 1  3  |→Spine|             | 5  7  |→Spine|             | 9  12 |→Spine|              |13  14 |→Spine|
#     | 2  4  |→FPGA |             | 6  8  |→FPGA |             |10  11 |→FPGA |              |15  16 |→FPGA |
#     +-------------+             +-------------+             +-------------+              +-------------+
#         |     |                     |     |                      |     |                       |     |
#         |     |                     |     |                      |     |                       |     |
#   Server1 (10.0.1.0/24)       Server2 (10.0.2.0/24)        Server3 (10.0.3.0/24)         Server4 (10.0.4.0/24)
#    enp202s0np0→FPGA1           enp202s0np0→FPGA1            enp202s0np0→FPGA1             enp202s0np0→FPGA1
#    enp177s0np0→FPGA2           enp177s0np0→FPGA2            enp177s0np0→FPGA2             enp202s0np0→FPGA2
#    FPGA1: 10.0.1.1/2           FPGA1: 10.0.2.1/2            FPGA1: 10.0.3.1/2             FPGA1: 10.0.4.1/2
#    FPGA2: 10.0.1.3/4           FPGA2: 10.0.2.3/4            FPGA2: 10.0.3.3/4             FPGA2: 10.0.4.3/4
#

topology:
  endpoints:  # here, endpoints are FPGA boards, each with 2 interfaces, installed on 4 different physical machines
    - id: fpga_1
      hostname: inet-p4lab-14
      network_interfaces:
        - name: enp202s0np0
          namespace: ns_fpga_1_p1
          ip_address: 10.0.1.1
          mac_address: 00:0a:35:06:50:94
        - name: enp202s0np1
          namespace: ns_fpga_1_p2
          ip_address: 10.0.1.2
          mac_address: 00:0a:35:06:50:95
    - id: fpga_2
      hostname: inet-p4lab-14
      network_interfaces:
        - name: enp177s0np0
          namespace: ns_fpga_2_p1
          ip_address: 10.0.1.3
          mac_address: 00:0a:35:06:09:24
        - name: enp177s0np1
          namespace: ns_fpga_2_p2
          ip_address: 10.0.1.4
          mac_address: 00:0a:35:06:09:25
    - id: fpga_3
      hostname: inet-p4lab-13
      network_interfaces:
        - name: enp202s0np0
          namespace: ns_fpga_3_p1
          ip_address: 10.0.2.1
          mac_address: 00:0a:35:06:0b:84
        - name: enp202s0np1
          namespace: ns_fpga_3_p2
          ip_address: 10.0.2.2
          mac_address: 00:0a:35:06:0b:85
    - id: fpga_4
      hostname: inet-p4lab-13
      network_interfaces:
        - name: enp177s0np0
          namespace: ns_fpga_4_p1
          ip_address: 10.0.2.3
          mac_address: 00:0a:35:06:09:3c
        - name: enp177s0np1
          namespace: ns_fpga_4_p2
          ip_address: 10.0.2.4
          mac_address: 00:0a:35:06:09:3d
    - id: fpga_5
      hostname: inet-p4lab-12
      network_interfaces:
        - name: enp202s0np0
          namespace: ns_fpga_5_p1
          ip_address: 10.0.3.1
          mac_address: 00:0a:35:06:0b:72
        - name: enp202s0np1
          namespace: ns_fpga_5_p2
          ip_address: 10.0.3.2
          mac_address: 00:0a:35:06:0b:73
    - id: fpga_6
      hostname: inet-p4lab-12
      network_interfaces:
        - name: enp177s0np0
          namespace: ns_fpga_6_p1
          ip_address: 10.0.3.3
          mac_address: 00:0a:35:06:09:9c
        - name: enp177s0np1
          namespace: ns_fpga_6_p2
          ip_address: 10.0.3.4
          mac_address: 00:0a:35:06:09:9d
    - id: fpga_7
      hostname: inet-p4lab-11
      network_interfaces:
        - name: enp202s0np0
          namespace: ns_fpga_7_p1
          ip_address: 10.0.4.1
          mac_address: 00:0a:35:06:09:8a
        - name: enp202s0np1
          namespace: ns_fpga_7_p2
          ip_address: 10.0.4.2
          mac_address: 00:0a:35:06:09:8b
    - id: fpga_8
      hostname: inet-p4lab-11
      network_interfaces:
        - name: enp177s0np0
          namespace: ns_fpga_8_p1
          ip_address: 10.0.4.3
          mac_address: 00:0a:35:06:09:30
        - name: enp177s0np1
          namespace: ns_fpga_8_p2
          ip_address: 10.0.4.4
          mac_address: 00:0a:35:06:09:31
  switches:
    # we use a single tofino switch to interconnect all FPGA boards, it's used to emulate a spine-leaf architecture
    identities:
      - id: tofino_switch_1
        type: tofino
        model: tofino2
        hostname: 10.0.13.21
        username: p4
        password: rocks
