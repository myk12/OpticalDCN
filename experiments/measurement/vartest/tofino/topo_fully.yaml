# ==============================================================================
# Tofino Front Panel Topology Visualization
# Layout: 2 Rows x 16 Columns (QSFP Cage Layout)
# Top Row: Odd Ports (p1, p3...p31) | Bottom Row: Even Ports (p2, p4...p32)
# ==============================================================================
#
#       [Top Row: Odd Ports]
#       p1    p3    p5    p7    p9    p11   p13   p15   p17   p19   p21   p23   p25   p27   p29   p31
#      ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐  ┌──┐
#      │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │
#      └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘  └─┬┘
#        \     \     \     \     \     \     \     \     \     \     \     \     \     \     \     |____
#          \    \     \     \     \     \     \     \     \     \     \     \     \     \     \         │
#           \    \     \     \     \     \     \     \     \     \     \     \     \     \     \        │
#            \    \     \     \     \     \     \     \     \     \     \     \     \     \     \       │
#      ┌─ ┐  ┌──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └──┐  └─┴┐   |
#      │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │  │   |
#      └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘  └──┘   |
#       p2    p4    p6    p8    p10   p12   p14   p16   p18   p20   p22   p24   p26   p28   p30   p32   |
#       │                                                                                               |
#     FPGA1                                                                                           FPGA2
#
# ------------------------------------------------------------------------------
# Connection Summary:
# 1. Standard Links (Shift Right Pattern):
#    p1->p4,  p3->p6,  p5->p8,  p7->p10, p9->p12, p11->p14, p13->p16
#    p17->p20, p19->p22, p21->p24, p23->p26, p25->p28, p27->p30, p29->p32
#
# 2. Special FPGA Links:
#    p2_0  <--> FPGA_port1
#    p31_0 <--> FPGA_port2
# ==============================================================================

ports:
  # pipeline 1 ports
  p1_0 : { conn_id: 1, chnl_id: 0 , FPGA: false}
  p2_0 : { conn_id: 2, chnl_id: 0 , FPGA: true}
  p3_0 : { conn_id: 3, chnl_id: 0 , FPGA: false}
  p4_0 : { conn_id: 4, chnl_id: 0 , FPGA: false}
  p5_0 : { conn_id: 5, chnl_id: 0 , FPGA: false}
